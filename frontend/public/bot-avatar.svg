<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="32" fill="url(#bg)"/>
  <!-- Head -->
  <rect x="36" y="28" width="56" height="48" rx="12" fill="#6c5ce7"/>
  <!-- Eyes - arrogant half-closed -->
  <ellipse cx="52" cy="46" rx="6" ry="4" fill="#1a1a2e"/>
  <ellipse cx="76" cy="44" rx="6" ry="4" fill="#1a1a2e"/>
  <!-- Raised eyebrow (left, from our perspective) -->
  <line x1="44" y1="40" x2="60" y2="37" stroke="#dfe6e9" stroke-width="3" stroke-linecap="round"/>
  <!-- Normal eyebrow -->
  <line x1="68" y1="40" x2="84" y2="40" stroke="#dfe6e9" stroke-width="3" stroke-linecap="round"/>
  <!-- Smirk mouth -->
  <path d="M 54 58 Q 64 68 78 56" fill="none" stroke="#dfe6e9" stroke-width="3" stroke-linecap="round"/>
  <!-- Crossed arms body -->
  <rect x="44" y="76" width="40" height="24" rx="8" fill="#6c5ce7"/>
  <line x1="54" y1="80" x2="48" y2="92" stroke="#a29bfe" stroke-width="4" stroke-linecap="round"/>
  <line x1="74" y1="80" x2="80" y2="92" stroke="#a29bfe" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms crossed overlay -->
  <line x1="50" y1="84" x2="78" y2="84" stroke="#a29bfe" stroke-width="5" stroke-linecap="round"/>
</svg>
