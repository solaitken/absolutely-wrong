<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0e0d0b"/>
  <rect width="128" height="128" rx="24" fill="none" stroke="#2a2722" stroke-width="2"/>

  <!-- Head -->
  <rect x="32" y="24" width="64" height="52" rx="16" fill="#1a1815" stroke="#2a2722" stroke-width="1.5"/>

  <!-- Eyes -->
  <ellipse cx="50" cy="44" rx="8" ry="5" fill="#f2ede3"/>
  <circle cx="50" cy="45" r="4" fill="#0e0d0b"/>
  <ellipse cx="78" cy="44" rx="8" ry="5" fill="#f2ede3"/>
  <circle cx="78" cy="45" r="4" fill="#0e0d0b"/>

  <!-- Raised left eyebrow - thick for readability -->
  <path d="M 40 38 Q 50 30 60 35" fill="none" stroke="#c8a968" stroke-width="4" stroke-linecap="round"/>

  <!-- Flat right eyebrow -->
  <line x1="68" y1="38" x2="88" y2="38" stroke="#c8a968" stroke-width="4" stroke-linecap="round"/>

  <!-- Smirk - thicker -->
  <path d="M 53 59 Q 64 71 77 57" fill="none" stroke="#c8a968" stroke-width="4" stroke-linecap="round"/>

  <!-- Torso -->
  <rect x="36" y="78" width="56" height="30" rx="12" fill="#1a1815" stroke="#2a2722" stroke-width="1.5"/>

  <!-- Crossed arms -->
  <line x1="40" y1="84" x2="88" y2="84" stroke="#c8a968" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="94" x2="44" y2="102" stroke="#c8a968" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="80" y1="94" x2="84" y2="102" stroke="#c8a968" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
